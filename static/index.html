<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Push Manager · 网页后台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">GPM</span>
      <span class="title">Game Push Manager · 网页后台</span>
    </div>
    <div class="meta">
      <span class="model-tag">Push 模型</span>
      <span id="generatedAt">—</span>
      <a href="/admin" class="nav-link">服务端管理</a>
      <span id="userBadge" class="user-badge"></span>
      <button id="logoutBtn" class="logout-btn" title="退出登录">退出</button>
    </div>
  </header>

  <main class="container">
    <section class="overall-light" id="overallLight">
      <span class="light-dot" id="overallDot"></span>
      <span class="overall-label">系统总体状态</span>
      <span class="overall-text" id="overallText">—</span>
    </section>

    <section class="summary" id="summary">
      <div class="card stat">
        <div class="stat-label">上报端在线</div>
        <div class="stat-value" id="reportersOnline">— / —</div>
      </div>
      <div class="card stat">
        <div class="stat-label">整合包（服务端聚合）</div>
        <div class="stat-value" id="totalModpacks">—</div>
      </div>
      <div class="card stat">
        <div class="stat-label">模组（服务端聚合）</div>
        <div class="stat-value" id="totalMods">—</div>
      </div>
    </section>

    <section class="legend">
      <span class="legend-title">指示灯图例：</span>
      <span class="legend-item"><span class="light-dot green"></span>健康</span>
      <span class="legend-item"><span class="light-dot yellow"></span>降级</span>
      <span class="legend-item"><span class="light-dot red"></span>异常</span>
      <span class="legend-item"><span class="light-dot off"></span>未知</span>
    </section>

    <section>
      <h2>服务端状态（主动上报）</h2>
      <div id="serverList" class="grid"></div>
    </section>

    <section>
      <h2>客户端状态（主动上报）</h2>
      <div id="clientList" class="grid"></div>
    </section>

    <section>
      <h2>游戏推送条目</h2>
      <div id="gameList"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
